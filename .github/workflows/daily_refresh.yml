name: Daily Data Refresh

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC = 18:30 IST every day
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily refresh
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python refresh/daily_refresh.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.csv data/processed/*.csv data/processed/refresh_log.json
          git diff --staged --quiet || git commit -m "Auto refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
